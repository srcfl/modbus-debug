name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./...

      - name: Build all platforms
        run: make build-all

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/modbus-debug-windows-amd64.exe
            bin/modbus-debug-darwin-arm64
            bin/modbus-debug-darwin-amd64
            bin/modbus-debug-linux-amd64
            bin/modbus-debug-linux-arm64
          generate_release_notes: true
